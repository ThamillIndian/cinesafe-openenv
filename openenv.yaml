name: cinesafe-openenv
description: Risk-aware film production planning environment for OpenEnv
entry_point: cinesafe_openenv.server.environment:CineSafeEnvironment
server:
  app: cinesafe_openenv.server.app:app
tags:
  - openenv
  - rl
  - planning
  - scheduling
  - production
  - safety

tasks:
  - id: "scene_risk_triage"
    name: "CineSafe Easy Risk Triage"
    description: "Identify basic safety risks in simple scenarios."
    difficulty: "easy"
    grader: "cinesafe_openenv.graders.aggregate:grade"
    
  - id: "multi_scene_planning"
    name: "CineSafe Medium Planning"
    description: "Coordinate multiple departments to secure hazards."
    difficulty: "medium"
    grader: "cinesafe_openenv.graders.aggregate:grade"
    
  - id: "disruption_recovery"
    name: "CineSafe Hard Disruption"
    description: "Handle severe hazards with budget constraints."
    difficulty: "hard"
    grader: "cinesafe_openenv.graders.aggregate:grade"
